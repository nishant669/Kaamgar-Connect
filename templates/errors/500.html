{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div style="text-align:center;padding:6rem 2rem;max-width:500px;margin:0 auto;">
  <div style="font-size:5rem;margin-bottom:1.5rem;">⚡</div>
  <h1 style="font-size:6rem;font-weight:900;color:var(--danger);font-family:var(--font-display);line-height:1;margin-bottom:.5rem;">500</h1>
  <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:1rem;">Something Went Wrong</h2>
  <p style="color:var(--muted);line-height:1.7;margin-bottom:2rem;">
    Our servers ran into an issue. Our team has been notified and we're working to fix it.
  </p>
  <a href="{% url 'accounts:landing' %}" class="btn btn-primary btn-lg btn-pill">🏠 Go Home</a>
</div>
{% endblock %}
